# Supabase local config (optional — for local dev with Supabase CLI)
# See: https://supabase.com/docs/guides/cli/config

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://your-app.vercel.app"]
jwt_expiry = 3600
enable_signup = true

[auth.external.google]
enabled = true
# client_id = ""
# secret = ""

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
